services:
  windows-vm:
    image: dockurr/windows:latest
    container_name: language-learning-library-windows-vm
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    environment:
      VERSION: "11"
      KVM: "Y"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "64G"
    ports:
      - "8006:8006"
      - "3389:3389"
    volumes:
      - ./storage:/storage
    restart: unless-stopped
